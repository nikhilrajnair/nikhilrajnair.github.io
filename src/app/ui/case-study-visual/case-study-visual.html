<figure>
  <figcaption>{{ heading() }}</figcaption>

  @switch (variant()) {
    @case ('workflow') {
      <div class="workflow" aria-label="Abstract connected workflow">
        @for (item of items(); track item; let last = $last) {
          <span>{{ item }}</span>
          @if (!last) {
            <i aria-hidden="true"></i>
          }
        }
      </div>
    }
    @case ('architecture') {
      <div class="architecture" aria-label="Abstract architecture with three system layers">
        <span>Experience layer</span>
        <span>Application layer</span>
        <span>Platform layer</span>
      </div>
    }
    @case ('component-system') {
      <div class="component-system" aria-label="Abstract reusable component system">
        <div class="tokens"><i></i><i></i><i></i></div>
        <div class="component-blocks"><span></span><span></span><span></span></div>
      </div>
    }
    @case ('before-after') {
      <div class="before-after" aria-label="Abstract before and after structure comparison">
        <div><strong>Before</strong><i></i><i></i><i></i><i></i></div>
        <div><strong>After</strong><i></i><i></i></div>
      </div>
    }
    @case ('metrics') {
      <div class="metrics" aria-label="Placeholder metrics panel">
        <div><strong>—</strong><span>Baseline</span></div>
        <div><strong>—</strong><span>Outcome</span></div>
        <div><strong>—</strong><span>Confidence</span></div>
      </div>
    }
  }

  <p>Abstract visual — no client or product data shown.</p>
</figure>
