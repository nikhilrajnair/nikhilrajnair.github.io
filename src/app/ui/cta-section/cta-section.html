<section>
  <app-container>
    <div class="panel">
      <div>
        <p class="eyebrow">Let’s work together</p>
        <h2>{{ heading() }}</h2>
        <p>{{ text() }}</p>
      </div>
      @if (external()) {
        <a appButton [href]="link()">{{ linkLabel() }}</a>
      } @else {
        <a appButton [routerLink]="link()">{{ linkLabel() }}</a>
      }
    </div>
  </app-container>
</section>
