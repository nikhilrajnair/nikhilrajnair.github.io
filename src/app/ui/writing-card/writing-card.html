<article>
  <div class="meta">
    <span appBadge>{{ article().topic }}</span>
    <span>{{ article().published }}</span>
  </div>
  <h2>{{ article().title }}</h2>
  <p>{{ article().summary }}</p>
  <a [href]="article().url" target="_blank" rel="noreferrer">
    Read article <span aria-hidden="true">↗</span>
  </a>
</article>
