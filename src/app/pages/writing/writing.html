<app-page-layout>
  <header class="page-intro">
    <p class="eyebrow">Writing</p>
    <h1>Notes on frontend engineering.</h1>
    <p class="lede">Practical writing about architecture, performance, and product craft.</p>
  </header>

  <div class="article-list">
    @for (article of writings; track article.slug) {
      <article>
        <p class="eyebrow">{{ article.topic }}</p>
        <h2>{{ article.title }}</h2>
        <p>{{ article.summary }}</p>
      </article>
    }
  </div>
</app-page-layout>
