<app-container>
  <section class="hero" aria-labelledby="home-title">
    <span appBadge>Senior Frontend Engineer</span>
    <h1 id="home-title">I build clear, resilient product experiences.</h1>
    <p class="lede">
      Product-minded frontend engineering with a focus on scalable architecture, accessible
      interfaces, and teams that ship with confidence.
    </p>
    <div class="actions">
      <a appButton routerLink="/work">View selected work</a>
      <a appButton variant="secondary" routerLink="/about">More about me</a>
    </div>
  </section>
</app-container>

<app-section
  eyebrow="Selected work"
  heading="Engineering decisions, made visible."
  intro="A small collection of product work framed around context, constraints, and outcomes."
>
  <div class="content-stack">
    @for (project of projects; track project.slug) {
      <app-case-study-card [project]="project" />
    }
  </div>
</app-section>

<app-section
  eyebrow="Approach"
  heading="Useful software is a team outcome."
  intro="Strong frontend work connects product judgment, technical quality, and delivery."
>
  <div class="metric-grid">
    <app-metric-card value="9+" label="Years building for the web" detail="Across product teams and platforms." />
    <app-metric-card value="A11y" label="Part of the default" detail="Semantic, usable, and keyboard friendly." />
    <app-metric-card value="End to end" label="From design to release" detail="Architecture, implementation, testing, and rollout." />
  </div>
</app-section>

<app-cta-section
  heading="Have a frontend problem worth solving?"
  text="I’m interested in product-focused teams that value clarity, quality, and pragmatic engineering."
  link="/about"
  linkLabel="Learn how I work"
/>
