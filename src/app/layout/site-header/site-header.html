<header>
  <app-container>
    <div class="header-inner">
      <a class="brand" routerLink="/" aria-label="Nikhil Raj, home">
        <span class="brand-mark" aria-hidden="true">NR</span>
        <span class="brand-name">Nikhil Raj</span>
      </a>

      <nav aria-label="Primary navigation">
        <a routerLink="/work" routerLinkActive="active" ariaCurrentWhenActive="page">Work</a>
        <a routerLink="/writing" routerLinkActive="active" ariaCurrentWhenActive="page">Writing</a>
        <a routerLink="/about" routerLinkActive="active" ariaCurrentWhenActive="page">About</a>
      </nav>

      <div class="header-actions">
        <button
          type="button"
          class="theme-toggle"
          (click)="theme.toggle()"
          [attr.aria-label]="
            theme.theme() === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'
          "
        >
          @if (theme.theme() === 'dark') {
            <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="12" r="4" />
              <path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
            </svg>
          } @else {
            <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z" />
            </svg>
          }
        </button>
        <a appButton variant="secondary" href="mailto:nikhilrajnair.a@gmail.com">Let’s talk</a>
      </div>
    </div>
  </app-container>
</header>
