<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Nikhil Raj | Frontend Engineer</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Frontend Engineer portfolio of Nikhil Raj with experience in Angular, React, Ember.js, and performance-focused product engineering.">
  <meta property="og:title" content="Nikhil Raj | Frontend Engineer">
  <meta property="og:description" content="Modern frontend portfolio, selected engineering work, and latest dev.to articles.">
  <link rel="icon" type="image/jpeg" href="favicon.jpeg">
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('portfolio-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = saved === 'light' || saved === 'dark' ? saved : (prefersDark ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (error) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
