<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Nikhil Raj — Senior Frontend Engineer</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Portfolio of Nikhil Raj, a Senior Frontend Engineer focused on thoughtful product engineering."
    />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0b0f1a" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f7f9fc" />
    <script>
      // Apply the saved theme before first paint to avoid a flash of the wrong theme.
      try {
        var theme = localStorage.getItem('theme');
        if (theme === 'light' || theme === 'dark') {
          document.documentElement.dataset.theme = theme;
        }
      } catch (e) {}
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="favicon.jpeg" />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
